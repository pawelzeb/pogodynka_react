<script>
        onload = function() {
            // getLocation()
            //notify()
            //localStorage.setItem('weather_city', null)
            console.log(localStorage.getItem('weather_city'))
            let list  = null
            if(localStorage.getItem('weather_city')) {
              list = JSON.parse(localStorage.getItem('weather_city'))
            }
            if(list == null)
              list = []
            list.push(Math.random())

            console.log(list)
            localStorage.setItem('weather_city', JSON.stringify(list))

            

            const bearing = document.querySelector('.bearing')
            bearing.style.transform = `rotate(-55deg)`

            const pp = document.querySelector('.pressure-pointer')
            pp.style.height = `15%`

            const sun = document.querySelector('.sun')
            sun.style.transform = `rotate(15deg)`
            windClass()

            const el = document.getElementById("tableWrapper");
            let isDown = false;
let startX, scrollLeft;
let velocity = 0;
let animationFrame;

el.addEventListener("mousedown", (e) => {
  isDown = true;
  startX = e.clientX;
  scrollLeft = el.scrollLeft;
  velocity = 0;
  cancelAnimationFrame(animationFrame);
  el.classList.add("grabbing");
});

el.addEventListener("mouseup", () => {
  isDown = false;
  el.classList.remove("grabbing");
  animateInertia();
});

el.addEventListener("mouseleave", () => {
  if (isDown) {
    isDown = false;
    el.classList.remove("grabbing");
    animateInertia();
  }
});

el.addEventListener("mousemove", (e) => {
  if (!isDown) return;
  const x = e.clientX;
  const dx = x - startX;
  el.scrollLeft = scrollLeft - dx;
  velocity = dx; // zapisz prędkość
});

// efekt inercji po puszczeniu
function animateInertia() {
  velocity *= 0.85;
  if (Math.abs(velocity) > 0.35) {
    el.scrollLeft -= velocity;
    animationFrame = requestAnimationFrame(animateInertia);
  }
}
        }

function windClass() {

    const windRow = document.querySelector("table tbody tr:nth-child(1)"); // zakładamy wind to pierwszy wiersz
    const windCells = windRow.querySelectorAll("td");

    windCells.forEach((cell) => {
      const value = parseFloat(cell.textContent);
      if (!isNaN(value)) {
        if (value < 25) {
          cell.classList.add("wind-calm");
        } else if (value < 50) {
          cell.classList.add("wind-medium");
        } else {
          cell.classList.add("wind-strong");
        }
      }
    });
}    
function notify() {
 if (Notification.permission === 'granted') {
  new Notification('Pogoda', {
    body: 'Dziś słonecznie! 🌞',
    icon: '10d.png'
  });
} else if (Notification.permission !== 'denied') {
  Notification.requestPermission().then(permission => {
    if (permission === 'granted') {
      new Notification('Pogoda', {
        body: 'Dziś słonecznie! 🌞',
        icon: '10d.png'
      });
    }
  });
}

}    
const x = document.getElementById("demo");

function getLocation() {
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(success, error);
  } else {
    x.innerHTML = "Geolocation is not supported by this browser.";
  }
}

function success(position) {

  fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${position.coords.latitude}&lon=${position.coords.longitude}`)
  .then(response => response.json())
  .then(data => {
    const city = data.address.city || data.address.town || data.address.village;
    console.log("Najbliższa miejscowość:", city);
      x.innerHTML = `Latitude: ${position.coords.latitude} <br>Longitude: ${position.coords.longitude}<br>Najbliższa miejscowość: <b> ${city}</b>`;

  });
}

function error() {
  alert("Sorry, no position available.");
}
